<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Raven</title>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        window.tailwind = { config: { darkMode: 'class' } }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="transition-colors duration-300">

    <div id="nav-container"></div>

    <div class="fixed right-4 top-1/2 -translate-y-1/2 hidden lg:flex flex-col items-center gap-4 z-40">
        <span class="text-[10px] font-mono text-slate-400 rotate-90 mb-4">SCALE_1:1</span>
        <div class="h-64 w-[2px] bg-slate-200 dark:bg-slate-800 relative overflow-hidden rounded-full">
            <div id="scroll-indicator" class="absolute top-0 left-0 w-full bg-indigo-600 transition-all duration-150">
            </div>
        </div>
        <span id="scroll-percentage" class="text-[10px] font-mono text-slate-400 mt-4">00%</span>
    </div>

    <section id="project-hero" class="relative h-[65vh] min-h-[450px] w-full overflow-hidden rounded-b-3xl mb-12">
        <div id="det-image-header" class="absolute inset-0 w-full h-full"></div>

        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/70 to-transparent"></div>

        <div class="absolute bottom-0 left-0 w-full pb-16 px-6">
            <div class="max-w-5xl mx-auto">
                <a href="index.html"
                    class="inline-flex items-center gap-2 text-white/70 font-semibold mb-8 hover:text-white hover:gap-4 transition-all">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span data-i18n="back-btn">Back</span>
                </a>
                <div id="det-tags" class="flex flex-wrap gap-2 mb-6"></div>
                <h1 id="det-title"
                    class="text-5xl md:text-8xl font-extrabold tracking-tighter text-white drop-shadow-2xl"></h1>
            </div>
        </div>
    </section>

    <div
        class="flex flex-wrap gap-y-4 gap-x-12 py-6 my-8 font-mono text-[10px] uppercase tracking-[0.2em] justify-center">
        <div>
            <span class="text-indigo-600 block mb-1">File_ID:</span>
            <span class="text-slate-200 dark:text-slate-600 font-bold">PRJ-2026-004</span>
        </div>
        <div>
            <span class="text-red-500 block mb-1">Priority:</span>
            <span class="text-slate-200 dark:text-slate-600 font-bold">High_Impact</span>
        </div>
        <div>
            <span class="text-amber-500 block mb-1">Status:</span>
            <span class="text-slate-200 dark:text-slate-600 font-bold">Deployed_Stable</span>
        </div>
        <div>
            <span class="text-slate-400 block mb-1">Jurisdiction:</span>
            <span class="text-slate-200 dark:text-slate-600 font-bold text-xs">Global/Web</span>
        </div>
    </div>

    <main class="py-20 px-6 max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-16">
            <div class="md:col-span-2">
                <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-indigo-600 mb-6"
                    data-i18n="about-project-head">About Project</h2>
                <p id="det-desc"
                    class="text-xl md:text-2xl text-slate-600 dark:text-slate-400 leading-relaxed font-medium"></p>
            </div>

            <aside class="space-y-8">
                <div
                    class="p-8 rounded-3xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 backdrop-blur-sm">
                    <h3 class="font-bold mb-6 uppercase tracking-widest text-xs text-slate-400">Project Assets</h3>
                    <a id="det-github" href="#" target="_blank"
                        class="flex items-center justify-between group py-3 border-b border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                        <span class="font-bold" data-i18n="github-link">Github Repository</span>
                        <i data-lucide="github" class="w-5 h-5"></i>
                    </a>
                </div>
            </aside>
        </div>
    </main>

    <div class="flex items-center gap-3 opacity-30 hover:opacity-100 transition-opacity cursor-default">
        <div
            class="w-10 h-10 border border-slate-400 dark:border-slate-600 rounded-full flex items-center justify-center italic font-black text-xs">
            R.
        </div>
        <div class="text-[9px] uppercase tracking-[0.3em] leading-tight">
            Certified System Architect<br>
            <span class="text-indigo-600">Authenticated 2026</span>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>

    <div
        class="fixed bottom-8 left-8 hidden 2xl:block font-mono text-[10px] leading-tight text-slate-400 uppercase tracking-widest z-50">
        <div class="flex items-center gap-2 mb-1">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span>Protocol: EHBO_READY</span>
        </div>
        <div class="mb-1">Compliance: GDPR_ENFORCED</div>
        <div>Jurisdiction: NL_EU_2026</div>
    </div>
</body>

</html>
