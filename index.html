<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Raven</title>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        window.tailwind = { config: { darkMode: 'class' } }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="transition-colors duration-300">
    <div id="nav-container"></div>

    <section class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <h1 class="text-5xl md:text-8xl font-extrabold tracking-tighter mb-6" data-i18n="hero-title">.</h1>
        <p class="text-xl md:text-2xl text-slate-500 dark:text-slate-400 max-w-3xl leading-relaxed"
            data-i18n="hero-sub">
        </p>
    </section>

    <section id="work" class="px-6 py-20 max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-12">
            <h2 class="text-3xl font-bold uppercase tracking-widest text-indigo-600" data-i18n="nav-work">
            </h2>
        </div>
        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12"></div>
    </section>

    <div id="footer-container"></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
